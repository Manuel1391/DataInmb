<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Puntos JSON (Radio 50m)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1f2e;
            color: #e8eaf0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── HEADER ── */
        #header {
            background: #12172a;
            border-bottom: 2px solid #2a3a5c;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        #header h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #7eb8f7;
            white-space: nowrap;
            margin-right: 6px;
        }

        .sep {
            width: 1px;
            height: 28px;
            background: #2a3a5c;
            flex-shrink: 0;
        }

        /* ── FILE STATE ── */
        #file-state-zone {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #file-name {
            font-size: 11px;
            color: #8896b0;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── FILTERS ── */
        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            color: #8896b0;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-group input[type="number"],
        .filter-group select {
            background: #232b40;
            border: 1px solid #2a3a5c;
            color: #e8eaf0;
            font-size: 12px;
            padding: 5px 8px;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.15s;
        }
        .filter-group input[type="number"] { width: 80px; }
        .filter-group select { cursor: pointer; }
        .filter-group input:focus,
        .filter-group select:focus { border-color: #2563eb; }

        /* tipo checkboxes */
        .tipo-checks {
            display: flex;
            gap: 10px;
        }
        .tipo-checks label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0;
        }
        .tipo-checks input[type="checkbox"] {
            accent-color: #2563eb;
            width: 14px;
            height: 14px;
        }
        .badge-aviso  { color: #60a5fa; }
        .badge-cierre { color: #f87171; }

        /* reset + counter */
        #btn-reset {
            background: #232b40;
            border: 1px solid #2a3a5c;
            color: #8896b0;
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        #btn-reset:hover { border-color: #7eb8f7; color: #7eb8f7; }

        #contador {
            font-size: 11px;
            color: #8896b0;
            white-space: nowrap;
            margin-left: auto;
        }
        #contador span { color: #7eb8f7; font-weight: 700; }

        /* ── MAP ── */
        #map {
            flex: 1;
            width: 100%;
            position: relative;
        }

        /* ── EMPTY STATE ── */
        #empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 999;
        }
        #empty-state .icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
        #empty-state p { font-size: 14px; color: #8896b0; line-height: 1.6; }
        #empty-state strong { color: #7eb8f7; }

        /* ── LOADING ── */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 999;
            background: rgba(26, 31, 46, 0.9);
            padding: 30px 40px;
            border-radius: 12px;
            border: 1px solid #2a3a5c;
        }
        #loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #2a3a5c;
            border-top-color: #7eb8f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin-top: 12px; font-size: 13px; color: #8896b0; }

        /* ── POPUP ── */
        .leaflet-popup-content-wrapper {
            background: #12172a !important;
            border: 1px solid #2a3a5c !important;
            border-radius: 8px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
            color: #e8eaf0 !important;
            padding: 0 !important;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-content { margin: 0 !important; }

        .popup-inner {
            padding: 14px 16px;
            min-width: 150px;
        }
        .popup-inner .pid {
            font-size: 20px;
            font-weight: 800;
            color: #7eb8f7;
            line-height: 1;
            margin-bottom: 10px;
        }
        .popup-inner .pid small {
            font-size: 10px;
            font-weight: 500;
            color: #8896b0;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 2px;
        }
        .popup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #2a3a5c;
        }
        .popup-cell { text-align: center; }
        .popup-cell .val {
            font-size: 15px;
            font-weight: 700;
        }
        .popup-cell .lbl {
            font-size: 10px;
            color: #8896b0;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .tipo-aviso  { color: #60a5fa; }
        .tipo-cierre { color: #f87171; }
        .tipo-otro   { color: #a3e635; }

        .leaflet-popup-close-button {
            color: #8896b0 !important;
            font-size: 18px !important;
            top: 6px !important;
            right: 8px !important;
        }
        .leaflet-popup-close-button:hover { color: #e8eaf0 !important; }
    </style>
</head>
<body>

<div id="header">
    <h1>🗺 Visor de Puntos JSON</h1>

    <div class="sep"></div>

    <div id="file-state-zone">
        <span id="file-name">Buscando datos...</span>
    </div>

    <div class="sep"></div>

    <div class="filter-group">
        <label>ID</label>
        <input type="number" id="filtroId" placeholder="ej. 42" min="1" oninput="aplicarFiltros()">
    </div>

    <div class="sep"></div>

    <div class="filter-group">
        <label>Año</label>
        <select id="filtroAnio" onchange="aplicarFiltros()">
            <option value="">Todos</option>
            </select>
    </div>

    <div class="sep"></div>

    <div class="filter-group">
        <label>Tipo</label>
        <div class="tipo-checks">
            <label><input type="checkbox" id="chkAviso"  checked onchange="aplicarFiltros()"> <span class="badge-aviso">Aviso</span></label>
            <label><input type="checkbox" id="chkCierre" checked onchange="aplicarFiltros()"> <span class="badge-cierre">Cierre</span></label>
        </div>
    </div>

    <div class="sep"></div>

    <button id="btn-reset" onclick="resetFiltros()">✕ Limpiar filtros</button>

    <div id="contador">Puntos visibles: <span id="numVisible">0</span> / <span id="numTotal">0</span></div>
</div>

<div id="map">
    <div id="loading">
        <div class="spinner"></div>
        <p>Cargando <strong>puntos_mapa.json</strong>...</p>
    </div>
    <div id="empty-state" style="display:none;">
        <div class="icon">📊</div>
        <p>No se pudo encontrar el archivo <strong>puntos_mapa.json</strong>.<br>Asegúrate de que esté subido en la misma carpeta del repositorio de GitHub.</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── MAPA ──────────────────────────────────────────────────────────────────────
const mapa = L.map('map', { zoomControl: true }).setView([-12.05, -77.05], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
}).addTo(mapa);

// ── ESTADO ────────────────────────────────────────────────────────────────────
let todosLosPuntos = [];   // [{ID, Tipo, Lat, Lng, Año}]
let capas = [];            // capas Leaflet activas

// ── REFERENCIAS DOM ──────────────────────────────────────────────────────────
const loadingEl = document.getElementById('loading');
const emptyStateEl = document.getElementById('empty-state');
const fileNameEl = document.getElementById('file-name');
const numTotalEl = document.getElementById('numTotal');
const numVisibleEl = document.getElementById('numVisible');
const selAnio = document.getElementById('filtroAnio');

// ── AÑO SELECT ────────────────────────────────────────────────────────────────
for (let y = 2026; y >= 2015; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    selAnio.appendChild(opt);
}

// ── PROCESAR DATOS JSON ──────────────────────────────────────────────────────
function procesarJSON(puntos) {
    // Se mapea soportando tanto claves en minúscula como en mayúscula del JSON
    todosLosPuntos = puntos
        .filter(p => {
            const coords = p.coordenadas || p.Coordenadas;
            return coords && (coords.lat !== undefined || coords.Lat !== undefined) && (coords.lng !== undefined || coords.Lng !== undefined);
        })
        .map(p => {
            const coords = p.coordenadas || p.Coordenadas;
            const latVal = coords.lat !== undefined ? coords.lat : coords.Lat;
            const lngVal = coords.lng !== undefined ? coords.lng : coords.Lng;
            const idVal = p.id !== undefined ? p.id : (p.ID !== undefined ? p.ID : '');
            const tipoVal = p.tipo !== undefined ? p.tipo : (p.Tipo !== undefined ? p.Tipo : '');
            const anioVal = p.anio !== undefined ? p.anio : (p.Año !== undefined ? p.Año : (p.Anio !== undefined ? p.Anio : null));

            return {
                ID:   idVal,
                Tipo: String(tipoVal).trim(),
                Lat:  parseFloat(latVal),
                Lng:  parseFloat(lngVal),
                Año:  anioVal !== null && anioVal !== '' ? parseInt(anioVal) : null
            };
        });

    loadingEl.style.display = 'none';
    emptyStateEl.style.display = 'none';
    fileNameEl.textContent = 'puntos_mapa.json ✓';
    numTotalEl.textContent = todosLosPuntos.length;
    resetFiltros();

    if (todosLosPuntos.length > 0) {
        const lats = todosLosPuntos.map(p => p.Lat);
        const lngs = todosLosPuntos.map(p => p.Lng);
        const bounds = L.latLngBounds(
            [Math.min(...lats), Math.min(...lngs)],
            [Math.max(...lats), Math.max(...lngs)]
        );
        mapa.fitBounds(bounds, { padding: [40, 40] });
    }
}

function mostrarErrorCarga() {
    loadingEl.style.display = 'none';
    emptyStateEl.style.display = 'block';
    fileNameEl.textContent = 'error de carga';
}

// ── CARGA AUTOMÁTICA DEL JSON ────────────────────────────────────────────────
function cargarArchivoJSON() {
    fetch('puntos_mapa.json?v=' + Date.now())
        .then(response => {
            if (!response.ok) throw new Error('Archivo JSON no encontrado');
            return response.json();
        })
        .then(data => {
            procesarJSON(data);
        })
        .catch(err => {
            console.error(err);
            mostrarErrorCarga();
        });
}

// ── FILTROS ───────────────────────────────────────────────────────────────────
function aplicarFiltros() {
    const filtroId    = document.getElementById('filtroId').value.trim();
    const filtroAnio  = document.getElementById('filtroAnio').value;
    const chkAviso    = document.getElementById('chkAviso').checked;
    const chkCierre   = document.getElementById('chkCierre').checked;

    const puntosFiltrados = todosLosPuntos.filter(p => {
        if (filtroId && String(p.ID) !== filtroId) return false;
        if (filtroAnio && p.Año !== parseInt(filtroAnio)) return false;
        const tipo = p.Tipo.toLowerCase();
        if (!chkAviso  && tipo === 'aviso')  return false;
        if (!chkCierre && tipo === 'cierre') return false;
        return true;
    });

    dibujarPuntos(puntosFiltrados);
    numVisibleEl.textContent = puntosFiltrados.length;
}

function resetFiltros() {
    document.getElementById('filtroId').value    = '';
    document.getElementById('filtroAnio').value  = '';
    document.getElementById('chkAviso').checked  = true;
    document.getElementById('chkCierre').checked = true;
    aplicarFiltros();
}

// ── DIBUJO ────────────────────────────────────────────────────────────────────
function limpiarCapas() {
    capas.forEach(c => mapa.removeLayer(c));
    capas = [];
}

function tipoClass(tipo) {
    const t = (tipo || '').toLowerCase();
    if (t === 'aviso')  return 'tipo-aviso';
    if (t === 'cierre') return 'tipo-cierre';
    return 'tipo-otro';
}

function obtenerColorPorTipo(tipo) {
    const t = (tipo || '').toLowerCase();
    if (t === 'aviso')  return '#3b82f6'; 
    if (t === 'cierre') return '#ef4444'; 
    return '#10b981';                     
}

function crearPopup(p) {
    return `
        <div class="popup-inner">
            <div class="pid">
                <small>ID</small>
                ${p.ID}
            </div>
            <div class="popup-row">
                <div class="popup-cell">
                    <div class="val ${tipoClass(p.Tipo)}">${p.Tipo || '—'}</div>
                    <div class="lbl">Tipo</div>
                </div>
                <div class="popup-cell">
                    <div class="val">${p.Año !== null ? p.Año : '—'}</div>
                    <div class="lbl">Año</div>
                </div>
            </div>
        </div>
    `;
}

function dibujarPuntos(puntos) {
    limpiarCapas();
    puntos.forEach(p => {
        const colorHex = obtenerColorPorTipo(p.Tipo);
        
        const circulo = L.circle([p.Lat, p.Lng], {
            radius: 50,           // Radio cambiado a 50 metros reales
            color: colorHex,       
            weight: 2,            
            opacity: 0.9,         
            fillColor: colorHex,   
            fillOpacity: 0.45      
        })
        .bindPopup(crearPopup(p), { closeButton: true, maxWidth: 220 })
        .addTo(mapa);
        
        capas.push(circulo);
    });
}

// ── INICIO ────────────────────────────────────────────────────────────────────
cargarArchivoJSON();
</script>
</body>
</html>
